<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xplore TV</title>
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            cursor: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* Player container */
        #player {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }

        /* Slide base */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 1;
        }

        .slide.active {
            opacity: 1;
            z-index: 2;
        }

        .slide.slide-transition {
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .slide.slide-left {
            transform: translateX(-100%);
        }

        .slide.slide-right {
            transform: translateX(100%);
        }

        .slide.slide-center {
            transform: translateX(0);
        }

        /* Tipo: Imagem */
        .slide-imagem {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .slide-imagem .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, transparent 50%);
        }

        .slide-imagem .caption {
            position: absolute;
            bottom: 8vh;
            left: 5vw;
            right: 5vw;
            color: #fff;
            z-index: 3;
        }

        .slide-imagem .caption h2 {
            font-size: clamp(2rem, 4vw, 4rem);
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            line-height: 1.15;
        }

        .slide-imagem .caption p {
            font-size: clamp(1rem, 2vw, 1.8rem);
            margin-top: 0.5em;
            opacity: 0.9;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
        }

        /* Tipo: Vídeo */
        .slide-video video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Tipo: Marca (brand) */
        .slide-marca {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
            flex-direction: column;
            gap: 2vh;
        }

        .slide-marca .brand-logo {
            max-width: 40vw;
            max-height: 30vh;
            object-fit: contain;
            filter: drop-shadow(0 4px 20px rgba(255, 255, 255, 0.15));
        }

        .slide-marca .brand-name {
            font-size: clamp(2rem, 5vw, 5rem);
            font-weight: 800;
            color: #fff;
            text-align: center;
            letter-spacing: 0.02em;
        }

        .slide-marca .brand-tagline {
            font-size: clamp(1rem, 2.5vw, 2.2rem);
            color: rgba(255, 255, 255, 0.75);
            text-align: center;
            font-weight: 300;
        }

        /* Tipo: Empresa */
        .slide-contato {
            background: linear-gradient(160deg, #1a2b4c 0%, #1e3a5f 40%, #1a2b4c 100%);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 4vh 5vw;
        }

        .slide-contato .empresa-logo {
            height: 22vh;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 4px 16px rgba(0, 0, 0, 0.3));
            margin-bottom: 5vh;
        }

        .slide-contato .empresa-columns {
            display: flex;
            align-items: center;
            gap: 0;
            width: 80%;
            max-width: 70vw;
        }

        .slide-contato .empresa-col-left {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3vh;
        }

        .slide-contato .empresa-col-divider {
            width: 2px;
            height: 28vh;
            background: rgba(255, 255, 255, 0.25);
            margin: 0 4vw;
            flex-shrink: 0;
        }

        .slide-contato .empresa-col-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5vh;
        }

        .slide-contato .empresa-row {
            display: flex;
            align-items: center;
            gap: 1.2vw;
            color: #fff;
            font-size: clamp(1.4rem, 2.8vw, 2.4rem);
            font-weight: 500;
        }

        .slide-contato .empresa-row svg {
            width: clamp(1.8rem, 3vw, 2.6rem);
            height: clamp(1.8rem, 3vw, 2.6rem);
            opacity: 0.9;
            flex-shrink: 0;
        }

        .slide-contato .empresa-site-label {
            display: flex;
            align-items: center;
            gap: 0.8vw;
            color: rgba(255, 255, 255, 0.85);
            font-size: clamp(1rem, 2vw, 1.6rem);
            font-weight: 400;
        }

        .slide-contato .empresa-site-label svg {
            width: clamp(1.4rem, 2.2vw, 2rem);
            height: clamp(1.4rem, 2.2vw, 2rem);
            flex-shrink: 0;
        }

        .slide-contato .empresa-qr {
            width: clamp(12rem, 22vh, 18rem);
            height: clamp(12rem, 22vh, 18rem);
            background: #fff;
            border-radius: 1rem;
            padding: 0.8rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .slide-contato .empresa-qr img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* Loading state */
        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            color: #fff;
            font-size: 1.5rem;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Error state */
        #error {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            background: #000;
            color: #fff;
            font-size: 1.2rem;
            z-index: 100;
            gap: 1rem;
        }

        #error.visible {
            display: flex;
        }

        #error .error-icon {
            font-size: 3rem;
            opacity: 0.6;
        }

        #error .retry-text {
            opacity: 0.5;
            font-size: 1rem;
        }

        /* Tipo: Viagem */
        .slide-viagem {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .slide-viagem .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.2) 40%, transparent 60%);
        }

        .slide-viagem .viagem-info {
            position: absolute;
            bottom: 8vh;
            left: 5vw;
            right: 5vw;
            color: #fff;
            z-index: 3;
        }

        .slide-viagem .viagem-info h2 {
            font-size: clamp(2rem, 3.5vw, 3.5rem);
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            line-height: 1.15;
        }

        .slide-viagem .viagem-info .viagem-detalhes {
            display: flex;
            align-items: baseline;
            gap: 2vw;
            margin-top: 1vh;
            flex-wrap: wrap;
        }

        .slide-viagem .viagem-preco {
            font-size: clamp(1.5rem, 3vw, 2.8rem);
            font-weight: 800;
            color: #22d3ee;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .slide-viagem .viagem-parcelas {
            font-size: clamp(0.9rem, 1.8vw, 1.5rem);
            opacity: 0.85;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
        }

        .slide-viagem .viagem-datas {
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            opacity: 0.75;
            margin-top: 0.5vh;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.4);
        }

        .slide-viagem .viagem-badge {
            position: absolute;
            top: 5vh;
            right: 5vw;
            background: rgba(14, 116, 144, 0.85);
            color: #fff;
            padding: 0.8vh 2vw;
            border-radius: 0.5rem;
            font-size: clamp(0.8rem, 1.5vw, 1.2rem);
            font-weight: 600;
            z-index: 3;
            backdrop-filter: blur(4px);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tipo: Hospedagem */
        .slide-hospedagem {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .slide-hospedagem .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.75) 0%, rgba(0, 0, 0, 0.15) 45%, transparent 65%);
        }

        .slide-hospedagem .hosp-info {
            position: absolute;
            bottom: 8vh;
            left: 5vw;
            right: 5vw;
            color: #fff;
            z-index: 3;
        }

        .slide-hospedagem .hosp-info h2 {
            font-size: clamp(1.8rem, 3.5vw, 3.2rem);
            font-weight: 700;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
        }

        .slide-hospedagem .hosp-info .hosp-local {
            font-size: clamp(1rem, 2vw, 1.6rem);
            opacity: 0.85;
            margin-top: 0.5vh;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
        }

        .slide-hospedagem .hosp-info .hosp-detalhes {
            display: flex;
            gap: 2vw;
            margin-top: 1vh;
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            opacity: 0.75;
        }

        .slide-hospedagem .hosp-badge {
            position: absolute;
            top: 5vh;
            right: 5vw;
            display: flex;
            align-items: center;
            gap: 0.5vw;
            background: rgba(14, 116, 144, 0.85);
            color: #fff;
            padding: 0.8vh 2vw;
            border-radius: 0.5rem;
            font-size: clamp(1rem, 2vw, 1.5rem);
            font-weight: 700;
            z-index: 3;
            backdrop-filter: blur(4px);
        }

        /* Tipo: Voo Premium */
        .slide-voo {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0c4a6e 100%);
            flex-direction: column;
            gap: 3vh;
            padding: 6vh 5vw;
            align-items: center;
        }

        .slide-voo .voo-badge {
            background: linear-gradient(135deg, #b45309, #d97706);
            color: #fff;
            padding: 0.6vh 2vw;
            border-radius: 0.4rem;
            font-size: clamp(0.8rem, 1.3vw, 1.1rem);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .slide-voo h2 {
            font-size: clamp(1.8rem, 3.5vw, 3.2rem);
            font-weight: 700;
            color: #fff;
            text-align: center;
            line-height: 1.2;
        }

        .slide-voo .voo-rota {
            font-size: clamp(1.1rem, 2vw, 1.8rem);
            color: rgba(255, 255, 255, 0.8);
            text-align: center;
        }

        .slide-voo .voo-preco {
            font-size: clamp(2rem, 4vw, 3.5rem);
            font-weight: 800;
            color: #fbbf24;
        }

        .slide-voo .voo-parcelas {
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            color: rgba(255, 255, 255, 0.7);
            margin-top: -1vh;
        }

        .slide-voo .voo-classe {
            font-size: clamp(0.9rem, 1.5vw, 1.2rem);
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }

        /* Vertical orientation adjustments */
        body.vertical .slide-imagem .caption {
            bottom: 12vh;
        }

        body.vertical .slide-marca .brand-logo {
            max-width: 60vw;
        }

        body.vertical .slide-contato .contact-items {
            gap: 3vh;
        }

        /* ── Composed Section (non-full-screen — matches site layout) ── */
        .composed-section {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 50%, #b45309 100%);
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 1;
            overflow: hidden;
        }

        .composed-section.section-hospedagens {
            background: linear-gradient(135deg, #7dd3fc 0%, #38bdf8 50%, #0ea5e9 100%);
        }

        .composed-section.active {
            opacity: 1;
            z-index: 2;
        }

        /* Section title — replicates SectionTitle component */
        .composed-header {
            padding: 3vh 5vw 1.5vh;
            text-align: center;
        }

        .composed-header h2 {
            font-size: clamp(2rem, 4vw, 3.4rem);
            font-weight: 300;
            color: #fff;
            line-height: 1.2;
            text-shadow: none;
        }

        .composed-header h2 strong {
            font-weight: 700;
            color: #1A2B4C;
            text-shadow: none;
        }

        .composed-header p {
            font-size: clamp(1rem, 1.8vw, 1.5rem);
            color: rgba(255, 255, 255, 0.9);
            margin-top: 1vh;
            text-shadow: 0 1px 6px rgba(0, 0, 0, 0.15);
        }

        /* Carousel container */
        .composed-carousel {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0 2vw;
            margin-top: 0.5vh;
        }

        /* ── Card base (site-matching white card with image top + info bottom) ── */
        .carousel-card {
            position: absolute;
            width: 30vw;
            height: 78vh;
            border-radius: 1.2rem;
            overflow: hidden;
            background: #fff;
            box-shadow: 0 25px 60px -10px rgba(0, 0, 0, 0.35), 0 12px 24px -5px rgba(0, 0, 0, 0.15);
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            will-change: transform, opacity;
            display: flex;
            flex-direction: column;
        }

        .carousel-card.card-active {
            z-index: 10;
            opacity: 1;
            transform: translateX(0) scale(1);
        }

        .carousel-card.card-prev {
            z-index: 5;
            opacity: 1;
            transform: translateX(-55%) scale(0.72);
        }

        .carousel-card.card-next {
            z-index: 5;
            opacity: 1;
            transform: translateX(55%) scale(0.72);
        }

        .carousel-card.card-far-prev {
            z-index: 3;
            opacity: 1;
            transform: translateX(-95%) scale(0.58);
        }

        .carousel-card.card-far-next {
            z-index: 3;
            opacity: 1;
            transform: translateX(95%) scale(0.58);
        }

        .carousel-card.card-hidden {
            z-index: 0;
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none;
        }

        /* ── Card image section (top ~54%) ── */
        .card-image-section {
            position: relative;
            height: 54%;
            overflow: hidden;
        }

        .card-image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-image-section .card-gradient {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.6) 0%, rgba(0, 0, 0, 0.25) 40%, transparent 60%);
        }

        /* Badges on image — amber badges (destaques) */
        .card-badges {
            position: absolute;
            top: 1.5vh;
            left: 1.2vw;
            display: flex;
            flex-wrap: wrap;
            gap: 0.4vw;
            z-index: 2;
        }

        .card-badge-destaque {
            background: #f59e0b;
            color: #fff;
            padding: 0.5vh 1vw;
            border-radius: 999px;
            font-size: clamp(0.7rem, 1.1vw, 1rem);
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        /* Premium badge for hospedagens */
        .card-badge-premium {
            background: #f59e0b;
            color: #fff;
            padding: 0.4vh 0.8vw;
            border-radius: 0.3rem;
            font-size: clamp(0.55rem, 0.9vw, 0.8rem);
            font-weight: 700;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        /* Caption overlaid at bottom of image (title + origin) */
        .card-image-caption {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2vh 1.6vw 1.5vh;
            color: #fff;
            z-index: 2;
        }

        .card-image-caption h3 {
            font-size: clamp(1.1rem, 2vw, 1.8rem);
            font-weight: 700;
            line-height: 1.2;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-image-caption .card-origin {
            display: flex;
            align-items: center;
            gap: 0.4vw;
            font-size: clamp(0.8rem, 1.3vw, 1.15rem);
            opacity: 0.9;
            margin-top: 0.5vh;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.4);
        }

        .card-image-caption .card-origin svg {
            width: clamp(0.85rem, 1.2vw, 1.1rem);
            height: clamp(0.85rem, 1.2vw, 1.1rem);
            flex-shrink: 0;
        }

        /* ── Card info section (bottom ~46%) ── */
        .card-info-section {
            height: 46%;
            padding: 2.2vh 1.8vw 2vh;
            display: flex;
            flex-direction: column;
        }

        /* Detail rows (icon + text) matching site grid */
        .card-detail-rows {
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
        }

        .card-detail-row {
            display: flex;
            align-items: center;
            gap: 0.6vw;
            font-size: clamp(0.9rem, 1.5vw, 1.3rem);
            color: #475569;
            min-width: 0;
        }

        .card-detail-row svg {
            width: clamp(1.1rem, 1.5vw, 1.35rem);
            height: clamp(1.1rem, 1.5vw, 1.35rem);
            color: #0e7490;
            flex-shrink: 0;
        }

        .card-detail-row span {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-divider {
            border: none;
            border-top: 1.5px solid #e2e8f0;
            margin: 1.5vh 0;
        }

        /* Price section at bottom */
        .card-price-section {
            margin-top: 0;
        }

        .card-price-label {
            font-size: clamp(0.85rem, 1.3vw, 1.15rem);
            color: #64748b;
        }

        .card-price-value {
            font-size: clamp(1.6rem, 2.8vw, 2.4rem);
            font-weight: 700;
            color: #0e7490;
            line-height: 1.2;
        }

        .card-installments {
            font-size: clamp(0.8rem, 1.2vw, 1.05rem);
            color: #64748b;
            margin-top: 0.3vh;
        }

        .card-xp-info {
            font-size: clamp(0.8rem, 1.2vw, 1.05rem);
            font-weight: 600;
            color: #d97706;
            margin-top: 0.3vh;
        }

        /* ── Hospedagem card info (simpler: name, location, guests) ── */
        .card-hosp-content {
            height: 46%;
            padding: 2.2vh 1.8vw 2vh;
            display: flex;
            flex-direction: column;
            gap: 1.2vh;
        }

        .card-hosp-content h3 {
            font-size: clamp(1.1rem, 2vw, 1.8rem);
            font-weight: 600;
            color: #0f172a;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Dots indicator */
        .composed-dots {
            display: flex;
            justify-content: center;
            gap: 0.6vw;
            padding: 1vh 0 1.8vh;
        }

        .composed-dots .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            transition: all 0.35s ease;
        }

        .composed-dots .dot.dot-active {
            background: #fff;
            width: 32px;
            border-radius: 5px;
        }

        /* Vertical adjustments for composed */
        body.vertical .carousel-card {
            width: 60vw;
            height: 60vh;
        }

        body.vertical .carousel-card.card-prev {
            transform: translateX(-55vw) scale(0.72);
        }

        body.vertical .carousel-card.card-next {
            transform: translateX(55vw) scale(0.72);
        }

        /* ── Top Bar com logo (igual ao site) ── */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 50;
            height: auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 2.3vh 3vw;
            background: linear-gradient(to right, rgba(26, 43, 76, 1) 0%, rgba(26, 43, 76, 0.95) 15%, rgba(26, 43, 76, 0.7) 25%, rgba(26, 43, 76, 0.4) 40%, rgba(26, 43, 76, 0.2) 55%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #topbar.topbar-visible {
            opacity: 1;
        }

        #topbar img {
            height: 9.2vh;
            width: auto;
            object-fit: contain;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        #topbar .topbar-tagline {
            color: #fff;
            font-size: clamp(1rem, 1.8vw, 1.4rem);
            font-weight: 700;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
            white-space: nowrap;
        }
    </style>
</head>

<body>
    <div id="loading">
        <div class="spinner"></div>
        <span>Carregando vitrine...</span>
    </div>
    <div id="error">
        <div class="error-icon">📺</div>
        <div>Sem itens disponíveis</div>
        <div class="retry-text">Tentando novamente em alguns segundos...</div>
    </div>
    <div id="topbar">
        <img src="/logo.png" alt="Xplore Viagens">
        <span class="topbar-tagline">Entre você e seu destino</span>
    </div>
    <div id="player"></div>

    <script>
        (function () {
            'use strict';

            // Config
            var POLL_INTERVAL = 60000;
            var RETRY_DELAY = 10000;
            var API_URL = '/api/trpc/xploreTv.playlist';
            var FORCE_FULL_SCREEN = ['slider', 'contato_empresa', 'voos_premium'];

            // State
            var entries = [];
            var currentIndex = -1;
            var timer = null;
            var innerTimer = null;
            var player = document.getElementById('player');
            var topbar = document.getElementById('topbar');
            var loadingEl = document.getElementById('loading');
            var errorEl = document.getElementById('error');

            // Orientation from query string
            var params = new URLSearchParams(window.location.search);
            var orientation = params.get('orientacao') || 'horizontal';
            if (orientation === 'vertical') {
                document.body.classList.add('vertical');
            }

            // SVG icons for contact section + card detail rows
            var icons = {
                phone: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
                email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>',
                whatsapp: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>',
                instagram: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="5"/><circle cx="17.5" cy="6.5" r="1.5" fill="currentColor"/></svg>',
                location: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
                mapPin: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 1 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg>',
                moon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>',
                users: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>',
                bed: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg>',
                building: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>',
                star: '<svg viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'
            };

            // Format currency BRL
            function formatBRL(value) {
                if (value == null) return '';
                return 'R$ ' + Number(value).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
            }

            // Format date
            function formatDate(dateStr) {
                if (!dateStr) return '';
                var d = new Date(dateStr);
                return d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'short' });
            }

            // Calculate nights between two dates
            function calculateNights(dataIda, dataVolta) {
                if (!dataIda || !dataVolta) return 0;
                var ida = new Date(dataIda);
                var volta = new Date(dataVolta);
                var diff = volta.getTime() - ida.getTime();
                return Math.max(0, Math.round(diff / (1000 * 60 * 60 * 24)));
            }

            // Section title/subtitle map (matches site SectionTitle)
            var SECTION_TITLES = {
                viagens: { title: 'Ofertas de ', highlight: 'Destinos', subtitle: 'Pacotes exclusivos para você viver experiências inesquecíveis' },
                hospedagens: { title: 'Lugares Únicos para ', highlight: 'Se Hospedar', subtitle: 'Descubra acomodações especiais em destinos incríveis' }
            };

            // ── Process sections into playlist entries ──
            function processPlaylist(sections) {
                var result = [];
                for (var s = 0; s < sections.length; s++) {
                    var secao = sections[s];
                    var itens = secao.itens || [];
                    if (itens.length === 0) continue;

                    var isFullScreen = secao.fullScreen || FORCE_FULL_SCREEN.indexOf(secao.codigo) >= 0;

                    if (isFullScreen) {
                        for (var i = 0; i < itens.length; i++) {
                            result.push({
                                type: 'fullscreen',
                                slide: {
                                    type: secao.codigo,
                                    data: itens[i],
                                    durationMs: secao.duracaoItemMs || 8000,
                                    transicao: secao.transicao || 'fade',
                                }
                            });
                        }
                    } else {
                        result.push({
                            type: 'composed',
                            section: {
                                codigo: secao.codigo,
                                nome: secao.nome,
                                itens: itens,
                                duracaoSecaoMs: secao.duracaoSecaoMs || 30000,
                                duracaoItemMs: secao.duracaoItemMs || 8000,
                                transicao: secao.transicao || 'fade',
                            }
                        });
                    }
                }
                return result;
            }

            // Fetch playlist from API
            function fetchPlaylist() {
                var url = API_URL + '?input=' + encodeURIComponent(JSON.stringify({ json: { orientacao: orientation } }));
                var xhr = new XMLHttpRequest();
                xhr.open('GET', url, true);
                xhr.timeout = 10000;
                xhr.onload = function () {
                    if (xhr.status === 200) {
                        try {
                            var response = JSON.parse(xhr.responseText);
                            var raw = response.result && response.result.data;
                            var sections = Array.isArray(raw) ? raw : (raw && raw.json ? raw.json : []);
                            var processed = processPlaylist(sections);
                            if (processed.length > 0) {
                                entries = processed;
                                hideLoading();
                                hideError();
                                if (currentIndex === -1) {
                                    currentIndex = 0;
                                    renderEntry(0);
                                    startLoop();
                                }
                            } else {
                                showError();
                            }
                        } catch (e) {
                            console.warn('[XploreTV] Parse error:', e);
                            showError();
                        }
                    } else {
                        showError();
                    }
                };
                xhr.onerror = function () { showError(); };
                xhr.ontimeout = function () { showError(); };
                xhr.send();
            }

            function hideLoading() {
                loadingEl.classList.add('hidden');
            }

            function showError() {
                hideLoading();
                if (entries.length === 0) {
                    errorEl.classList.add('visible');
                    setTimeout(fetchPlaylist, RETRY_DELAY);
                }
            }

            function hideError() {
                errorEl.classList.remove('visible');
            }

            function escapeCSS(s) {
                return s.replace(/['"\\()]/g, '\\$&');
            }

            // ── Full-screen slide builder (existing section types) ──
            function buildSlide(slide) {
                var el = document.createElement('div');
                el.className = 'slide';
                var d = slide.data;

                switch (slide.type) {
                    case 'slider': {
                        el.classList.add('slide-imagem');
                        el.style.backgroundImage = 'url(' + escapeCSS(d.imageUrl || '') + ')';
                        var overlay = document.createElement('div');
                        overlay.className = 'overlay';
                        el.appendChild(overlay);
                        if (d.title || d.subtitle) {
                            var caption = document.createElement('div');
                            caption.className = 'caption';
                            if (d.title) {
                                var h2 = document.createElement('h2');
                                h2.textContent = d.title;
                                caption.appendChild(h2);
                            }
                            if (d.subtitle) {
                                var p = document.createElement('p');
                                p.textContent = d.subtitle;
                                caption.appendChild(p);
                            }
                            el.appendChild(caption);
                        }
                        break;
                    }

                    case 'viagens': {
                        el.classList.add('slide-viagem');
                        el.style.backgroundImage = 'url(' + escapeCSS(d.imagemUrl || '') + ')';
                        var ovl = document.createElement('div');
                        ovl.className = 'overlay';
                        el.appendChild(ovl);
                        if (d.origem) {
                            var badge = document.createElement('div');
                            badge.className = 'viagem-badge';
                            badge.textContent = 'Saindo de ' + d.origem;
                            el.appendChild(badge);
                        }
                        var info = document.createElement('div');
                        info.className = 'viagem-info';
                        var h2v = document.createElement('h2');
                        h2v.textContent = d.titulo || '';
                        info.appendChild(h2v);
                        var detalhes = document.createElement('div');
                        detalhes.className = 'viagem-detalhes';
                        if (d.valorTotal) {
                            var preco = document.createElement('span');
                            preco.className = 'viagem-preco';
                            preco.textContent = formatBRL(d.valorTotal);
                            detalhes.appendChild(preco);
                        }
                        if (d.quantidadeParcelas && d.valorParcela) {
                            var parcelas = document.createElement('span');
                            parcelas.className = 'viagem-parcelas';
                            parcelas.textContent = d.quantidadeParcelas + 'x de ' + formatBRL(d.valorParcela) + (d.temJuros ? '' : ' s/ juros');
                            detalhes.appendChild(parcelas);
                        }
                        info.appendChild(detalhes);
                        if (d.dataIda) {
                            var datas = document.createElement('div');
                            datas.className = 'viagem-datas';
                            datas.textContent = formatDate(d.dataIda) + (d.dataVolta ? ' \u2192 ' + formatDate(d.dataVolta) : '');
                            info.appendChild(datas);
                        }
                        el.appendChild(info);
                        break;
                    }

                    case 'hospedagens': {
                        el.classList.add('slide-hospedagem');
                        el.style.backgroundImage = 'url(' + escapeCSS(d.primary_image || '') + ')';
                        var ovlH = document.createElement('div');
                        ovlH.className = 'overlay';
                        el.appendChild(ovlH);
                        if (d.xp) {
                            var badgeH = document.createElement('div');
                            badgeH.className = 'hosp-badge';
                            badgeH.textContent = d.xp + ' XP';
                            el.appendChild(badgeH);
                        }
                        var infoH = document.createElement('div');
                        infoH.className = 'hosp-info';
                        var h2h = document.createElement('h2');
                        h2h.textContent = d.name || '';
                        infoH.appendChild(h2h);
                        if (d.city || d.country) {
                            var local = document.createElement('div');
                            local.className = 'hosp-local';
                            local.textContent = [d.city, d.country].filter(Boolean).join(', ');
                            infoH.appendChild(local);
                        }
                        var detH = document.createElement('div');
                        detH.className = 'hosp-detalhes';
                        if (d.bedrooms) {
                            var bedSpan = document.createElement('span');
                            bedSpan.textContent = d.bedrooms + ' quarto' + (d.bedrooms > 1 ? 's' : '');
                            detH.appendChild(bedSpan);
                        }
                        if (d.max_guests) {
                            var guestSpan = document.createElement('span');
                            guestSpan.textContent = 'at\u00e9 ' + d.max_guests + ' h\u00f3spede' + (d.max_guests > 1 ? 's' : '');
                            detH.appendChild(guestSpan);
                        }
                        if (detH.children.length > 0) infoH.appendChild(detH);
                        el.appendChild(infoH);
                        break;
                    }

                    case 'voos_premium': {
                        el.classList.add('slide-voo');
                        var vooBadge = document.createElement('div');
                        vooBadge.className = 'voo-badge';
                        vooBadge.textContent = (d.companhiaAerea || 'Voo') + (d.classe ? ' \u2022 ' + d.classe : '');
                        el.appendChild(vooBadge);
                        var h2f = document.createElement('h2');
                        h2f.textContent = d.titulo || 'Oferta de Voo';
                        el.appendChild(h2f);
                        if (d.origemPrincipal || d.destinosResumo) {
                            var rota = document.createElement('div');
                            rota.className = 'voo-rota';
                            rota.textContent = (d.origemPrincipal || '') + (d.destinosResumo ? ' \u2192 ' + d.destinosResumo : '');
                            el.appendChild(rota);
                        }
                        if (d.preco) {
                            var precoF = document.createElement('div');
                            precoF.className = 'voo-preco';
                            precoF.textContent = formatBRL(d.preco);
                            el.appendChild(precoF);
                        }
                        if (d.parcelas && d.parcelas > 1 && d.preco) {
                            var parcF = document.createElement('div');
                            parcF.className = 'voo-parcelas';
                            parcF.textContent = 'ou ' + d.parcelas + 'x de ' + formatBRL(d.preco / d.parcelas);
                            el.appendChild(parcF);
                        }
                        if (d.classe) {
                            var classeEl = document.createElement('div');
                            classeEl.className = 'voo-classe';
                            classeEl.textContent = 'Classe ' + d.classe;
                            el.appendChild(classeEl);
                        }
                        break;
                    }

                    case 'contato_empresa': {
                        el.classList.add('slide-contato');

                        // Logo grande no topo
                        var logoImg = document.createElement('img');
                        logoImg.src = '/logo.png';
                        logoImg.alt = d.companyName || 'Xplore Viagens';
                        logoImg.className = 'empresa-logo';
                        el.appendChild(logoImg);

                        // 2 colunas
                        var columns = document.createElement('div');
                        columns.className = 'empresa-columns';

                        // Coluna esquerda: whatsapp + instagram
                        var colLeft = document.createElement('div');
                        colLeft.className = 'empresa-col-left';

                        var phoneNumber = d.phone || d.whatsapp;
                        if (phoneNumber) {
                            var phoneRow = document.createElement('div');
                            phoneRow.className = 'empresa-row';
                            phoneRow.innerHTML = icons.whatsapp;
                            var phoneText = document.createElement('span');
                            phoneText.textContent = phoneNumber;
                            phoneRow.appendChild(phoneText);
                            colLeft.appendChild(phoneRow);
                        }

                        if (d.instagram) {
                            var igRow = document.createElement('div');
                            igRow.className = 'empresa-row';
                            igRow.innerHTML = icons.instagram;
                            var igText = document.createElement('span');
                            var igHandle = d.instagram.replace(/^@/, '').replace(/^https?:\/\/(www\.)?instagram\.com\//, '').replace(/\/+$/, '');
                            igText.textContent = igHandle;
                            igRow.appendChild(igText);
                            colLeft.appendChild(igRow);
                        }

                        columns.appendChild(colLeft);

                        // Divisor vertical
                        var divLine = document.createElement('div');
                        divLine.className = 'empresa-col-divider';
                        columns.appendChild(divLine);

                        // Coluna direita: acesse nosso site + QR code
                        var colRight = document.createElement('div');
                        colRight.className = 'empresa-col-right';

                        var siteLabel = document.createElement('div');
                        siteLabel.className = 'empresa-site-label';
                        siteLabel.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/><path d="M12 18h.01"/></svg>';
                        var siteLabelText = document.createElement('span');
                        siteLabelText.textContent = 'Acesse nosso site';
                        siteLabel.appendChild(siteLabelText);
                        colRight.appendChild(siteLabel);

                        var qrContainer = document.createElement('div');
                        qrContainer.className = 'empresa-qr';
                        var qrImg = document.createElement('img');
                        qrImg.src = 'https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://xploreviagens.com.br';
                        qrImg.alt = 'QR Code - xploreviagens.com.br';
                        qrContainer.appendChild(qrImg);
                        colRight.appendChild(qrContainer);

                        columns.appendChild(colRight);
                        el.appendChild(columns);
                        break;
                    }

                    default: {
                        el.style.background = '#111';
                        el.style.color = '#fff';
                        el.style.fontSize = '2rem';
                        el.textContent = d.titulo || d.title || d.nome || 'Bloco';
                    }
                }

                return el;
            }

            // ── Composed section card builders (match site layout) ──

            function createSvgIcon(key) {
                var span = document.createElement('span');
                span.style.display = 'inline-flex';
                span.style.flexShrink = '0';
                span.innerHTML = icons[key] || '';
                return span;
            }

            function buildViagemCard(d) {
                var card = document.createElement('div');
                card.className = 'carousel-card';

                // ── Image section (top 54%) ──
                var imgSection = document.createElement('div');
                imgSection.className = 'card-image-section';

                var img = document.createElement('img');
                img.src = d.imagemUrl || '';
                img.alt = d.titulo || '';
                img.loading = 'lazy';
                imgSection.appendChild(img);

                var gradient = document.createElement('div');
                gradient.className = 'card-gradient';
                imgSection.appendChild(gradient);

                // Destaques badges (amber, top-left — like site)
                if (d.destaques && d.destaques.length > 0) {
                    var badges = document.createElement('div');
                    badges.className = 'card-badges';
                    for (var b = 0; b < d.destaques.length; b++) {
                        var badge = document.createElement('span');
                        badge.className = 'card-badge-destaque';
                        badge.textContent = d.destaques[b].nome;
                        badges.appendChild(badge);
                    }
                    imgSection.appendChild(badges);
                }

                // Caption at bottom of image (title + origin)
                var caption = document.createElement('div');
                caption.className = 'card-image-caption';

                var h3 = document.createElement('h3');
                h3.textContent = d.titulo || '';
                caption.appendChild(h3);

                if (d.tipoViagem === 'hospedagem') {
                    if (d.hospedagem) {
                        var hospEl = document.createElement('div');
                        hospEl.className = 'card-origin';
                        var bIcon = createSvgIcon('building');
                        hospEl.appendChild(bIcon);
                        var bText = document.createElement('span');
                        bText.textContent = d.hospedagem;
                        hospEl.appendChild(bText);
                        caption.appendChild(hospEl);
                    }
                } else if (d.origem) {
                    var originEl = document.createElement('div');
                    originEl.className = 'card-origin';
                    var mIcon = createSvgIcon('mapPin');
                    originEl.appendChild(mIcon);
                    var mText = document.createElement('span');
                    mText.textContent = 'Saindo de ' + d.origem;
                    originEl.appendChild(mText);
                    caption.appendChild(originEl);
                }

                imgSection.appendChild(caption);
                card.appendChild(imgSection);

                // ── Info section (bottom 46%) ──
                var info = document.createElement('div');
                info.className = 'card-info-section';

                var rows = document.createElement('div');
                rows.className = 'card-detail-rows';

                // Row 1: Nights + dates
                var nights = calculateNights(d.dataIda, d.dataVolta);
                var row1 = document.createElement('div');
                row1.className = 'card-detail-row';
                row1.appendChild(createSvgIcon('moon'));
                var span1 = document.createElement('span');
                if (nights > 0) {
                    span1.textContent = nights + (nights === 1 ? ' noite' : ' noites') + ' \u00B7 ' + formatDate(d.dataIda) + ' a ' + formatDate(d.dataVolta);
                } else {
                    span1.textContent = formatDate(d.dataIda) || 'Data não informada';
                }
                row1.appendChild(span1);
                rows.appendChild(row1);

                // Row 2: Travelers
                var row2 = document.createElement('div');
                row2.className = 'card-detail-row';
                row2.appendChild(createSvgIcon('users'));
                var span2 = document.createElement('span');
                var qty = d.quantidadePessoas || 1;
                if (d.tipoViagem === 'hospedagem') {
                    span2.textContent = qty + (qty === 1 ? ' hóspede' : ' hóspedes');
                } else {
                    span2.textContent = qty + (qty === 1 ? ' viajante' : ' viajantes');
                }
                row2.appendChild(span2);
                rows.appendChild(row2);

                // Row 3: Room type or accommodation
                var row3 = document.createElement('div');
                row3.className = 'card-detail-row';
                if (d.tipoViagem === 'hospedagem') {
                    row3.appendChild(createSvgIcon('bed'));
                    var span3 = document.createElement('span');
                    span3.textContent = d.tipoQuarto || 'Tipo de quarto não informado';
                    row3.appendChild(span3);
                } else {
                    row3.appendChild(createSvgIcon('building'));
                    var span3b = document.createElement('span');
                    span3b.textContent = d.hospedagem || 'Hospedagem não informada';
                    row3.appendChild(span3b);
                }
                rows.appendChild(row3);

                info.appendChild(rows);

                // Divider
                var divider = document.createElement('hr');
                divider.className = 'card-divider';
                info.appendChild(divider);

                // Price section
                var priceSection = document.createElement('div');
                priceSection.className = 'card-price-section';

                if (d.valorTotal) {
                    var label = document.createElement('div');
                    label.className = 'card-price-label';
                    label.textContent = 'A partir de';
                    priceSection.appendChild(label);

                    var price = document.createElement('div');
                    price.className = 'card-price-value';
                    price.textContent = formatBRL(d.valorTotal);
                    priceSection.appendChild(price);
                }

                if (d.quantidadeParcelas && d.valorParcela) {
                    var parcelas = document.createElement('div');
                    parcelas.className = 'card-installments';
                    parcelas.textContent = 'ou ' + d.quantidadeParcelas + 'x de ' + formatBRL(d.valorParcela) + (d.temJuros ? ' com juros' : ' sem juros');
                    priceSection.appendChild(parcelas);
                }

                if (d.xp && d.xp > 0) {
                    var xpEl = document.createElement('div');
                    xpEl.className = 'card-xp-info';
                    xpEl.textContent = 'Acumule +' + Number(d.xp).toLocaleString('pt-BR') + ' pontos XP';
                    priceSection.appendChild(xpEl);
                }

                info.appendChild(priceSection);
                card.appendChild(info);

                return card;
            }

            function buildHospedagemCard(d) {
                var card = document.createElement('div');
                card.className = 'carousel-card';

                // ── Image section (top 54%) ──
                var imgSection = document.createElement('div');
                imgSection.className = 'card-image-section';

                var img = document.createElement('img');
                img.src = d.primary_image || '';
                img.alt = d.name || '';
                img.loading = 'lazy';
                imgSection.appendChild(img);

                // XP badge (top-right, like site's premium badge position)
                if (d.xp && d.xp > 0) {
                    var badges = document.createElement('div');
                    badges.className = 'card-badges';
                    var xpBadge = document.createElement('span');
                    xpBadge.className = 'card-badge-destaque';
                    xpBadge.textContent = '+' + Number(d.xp).toLocaleString('pt-BR') + ' XP';
                    badges.appendChild(xpBadge);
                    imgSection.appendChild(badges);
                }

                card.appendChild(imgSection);

                // ── Content section (bottom 46%) ──
                var content = document.createElement('div');
                content.className = 'card-hosp-content';

                var h3 = document.createElement('h3');
                h3.textContent = d.name || '';
                content.appendChild(h3);

                // Location row with MapPin icon
                if (d.city || d.country) {
                    var locRow = document.createElement('div');
                    locRow.className = 'card-detail-row';
                    locRow.appendChild(createSvgIcon('mapPin'));
                    var locText = document.createElement('span');
                    locText.textContent = [d.city, d.country].filter(Boolean).join(', ');
                    locRow.appendChild(locText);
                    content.appendChild(locRow);
                }

                // Guests row with Users icon
                if (d.max_guests) {
                    var guestRow = document.createElement('div');
                    guestRow.className = 'card-detail-row';
                    guestRow.appendChild(createSvgIcon('users'));
                    var guestText = document.createElement('span');
                    guestText.textContent = 'Até ' + d.max_guests + ' hóspede' + (d.max_guests > 1 ? 's' : '');
                    guestRow.appendChild(guestText);
                    content.appendChild(guestRow);
                }

                // Divider
                var divider = document.createElement('hr');
                divider.className = 'card-divider';
                content.appendChild(divider);

                // XP info
                var xpEl = document.createElement('div');
                xpEl.className = 'card-xp-info';
                xpEl.textContent = 'Acumule pontos XP';
                content.appendChild(xpEl);

                card.appendChild(content);
                return card;
            }

            // ── Build composed section (carousel of cards) ──

            function buildComposedSection(section) {
                var container = document.createElement('div');
                container.className = 'composed-section section-' + section.codigo;

                // Section title (matches site SectionTitle component)
                var header = document.createElement('div');
                header.className = 'composed-header';
                var h2 = document.createElement('h2');
                var titleData = SECTION_TITLES[section.codigo];
                if (titleData) {
                    h2.innerHTML = titleData.title + '<strong>' + titleData.highlight + '</strong>';
                } else {
                    h2.textContent = section.nome;
                }
                header.appendChild(h2);
                if (titleData && titleData.subtitle) {
                    var subtitle = document.createElement('p');
                    subtitle.textContent = titleData.subtitle;
                    header.appendChild(subtitle);
                }
                container.appendChild(header);

                // Carousel
                var carousel = document.createElement('div');
                carousel.className = 'composed-carousel';

                for (var i = 0; i < section.itens.length; i++) {
                    var card;
                    if (section.codigo === 'viagens') {
                        card = buildViagemCard(section.itens[i]);
                    } else if (section.codigo === 'hospedagens') {
                        card = buildHospedagemCard(section.itens[i]);
                    } else {
                        card = document.createElement('div');
                        card.className = 'carousel-card';
                        card.style.background = '#fff';
                        card.style.display = 'flex';
                        card.style.alignItems = 'center';
                        card.style.justifyContent = 'center';
                        card.style.color = '#0f172a';
                        card.style.fontSize = '1.5rem';
                        card.textContent = section.itens[i].titulo || section.itens[i].name || '';
                    }
                    card.dataset.cardIndex = String(i);
                    carousel.appendChild(card);
                }

                container.appendChild(carousel);

                // Dots
                if (section.itens.length > 1) {
                    var dots = document.createElement('div');
                    dots.className = 'composed-dots';
                    for (var d = 0; d < section.itens.length; d++) {
                        var dot = document.createElement('div');
                        dot.className = 'dot' + (d === 0 ? ' dot-active' : '');
                        dots.appendChild(dot);
                    }
                    container.appendChild(dots);
                }

                // Set initial card positions (5-card layout like site)
                updateCarouselPositions(carousel, container.querySelector('.composed-dots'), 0, section.itens.length);

                return container;
            }

            // ── Inner carousel management ──

            function clearInnerCarousel() {
                if (innerTimer) {
                    clearInterval(innerTimer);
                    innerTimer = null;
                }
            }

            function startInnerCarousel(container, section) {
                var activeIdx = 0;
                var carousel = container.querySelector('.composed-carousel');
                var dots = container.querySelector('.composed-dots');
                var count = section.itens.length;

                if (count <= 1) return;

                innerTimer = setInterval(function () {
                    activeIdx = (activeIdx + 1) % count;
                    updateCarouselPositions(carousel, dots, activeIdx, count);
                }, section.duracaoItemMs);
            }

            function updateCarouselPositions(carousel, dots, activeIdx, count) {
                var cards = carousel.querySelectorAll('.carousel-card');
                for (var i = 0; i < cards.length; i++) {
                    cards[i].classList.remove('card-active', 'card-prev', 'card-next', 'card-far-prev', 'card-far-next', 'card-hidden');
                    if (i === activeIdx) {
                        cards[i].classList.add('card-active');
                    } else if (i === (activeIdx - 1 + count) % count) {
                        cards[i].classList.add('card-prev');
                    } else if (i === (activeIdx + 1) % count) {
                        cards[i].classList.add('card-next');
                    } else if (i === (activeIdx - 2 + count) % count && count > 3) {
                        cards[i].classList.add('card-far-prev');
                    } else if (i === (activeIdx + 2) % count && count > 3) {
                        cards[i].classList.add('card-far-next');
                    } else {
                        cards[i].classList.add('card-hidden');
                    }
                }
                if (dots) {
                    var dotEls = dots.querySelectorAll('.dot');
                    for (var d = 0; d < dotEls.length; d++) {
                        dotEls[d].classList.toggle('dot-active', d === activeIdx);
                    }
                }
            }

            // ── Render an entry (full-screen slide or composed section) ──

            function renderEntry(index) {
                if (entries.length === 0) return;
                var entry = entries[index];
                if (!entry) return;

                // Stop any inner carousel from previous composed section
                clearInnerCarousel();

                // Fade out existing elements
                var existing = player.querySelectorAll('.slide, .composed-section');
                for (var i = 0; i < existing.length; i++) {
                    existing[i].classList.remove('active');
                    var videos = existing[i].querySelectorAll('video');
                    for (var v = 0; v < videos.length; v++) {
                        try { videos[v].pause(); } catch (e) { }
                    }
                }

                var el;
                if (entry.type === 'composed') {
                    el = buildComposedSection(entry.section);
                } else {
                    el = buildSlide(entry.slide);
                }

                player.appendChild(el);

                // Show topbar only on slider sections
                var isSlider = entry.type === 'fullscreen' && entry.slide && entry.slide.type === 'slider';
                if (isSlider) {
                    topbar.classList.add('topbar-visible');
                } else {
                    topbar.classList.remove('topbar-visible');
                }

                requestAnimationFrame(function () {
                    requestAnimationFrame(function () {
                        el.classList.add('active');
                        if (entry.type === 'composed') {
                            startInnerCarousel(el, entry.section);
                        }
                        var vids = el.querySelectorAll('video');
                        for (var vi = 0; vi < vids.length; vi++) {
                            try { vids[vi].play(); } catch (e) { }
                        }
                    });
                });

                // Remove old elements after transition
                setTimeout(function () {
                    var old = player.querySelectorAll('.slide:not(.active), .composed-section:not(.active)');
                    for (var r = 0; r < old.length; r++) {
                        try { player.removeChild(old[r]); } catch (e) { }
                    }
                }, 1200);
            }

            // ── Loop control ──

            function startLoop() {
                if (timer) clearTimeout(timer);
                scheduleNext();
            }

            function scheduleNext() {
                if (entries.length === 0) return;
                var entry = entries[currentIndex];
                var duration;
                if (entry && entry.type === 'composed') {
                    duration = entry.section.duracaoSecaoMs;
                } else {
                    duration = (entry && entry.slide && entry.slide.durationMs) || 8000;
                }

                timer = setTimeout(function () {
                    currentIndex = (currentIndex + 1) % entries.length;
                    renderEntry(currentIndex);
                    scheduleNext();
                }, duration);
            }

            // Try fullscreen
            function tryFullscreen() {
                var el = document.documentElement;
                var req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (req) {
                    try { req.call(el); } catch (e) { }
                }
            }

            document.addEventListener('click', tryFullscreen, { once: true });
            document.addEventListener('keydown', tryFullscreen, { once: true });

            // Periodic playlist refresh
            setInterval(fetchPlaylist, POLL_INTERVAL);

            // Start
            fetchPlaylist();
        })();
    </script>
</body>
